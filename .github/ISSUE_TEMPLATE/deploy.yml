name: Production deployment
description: Build and roll out the locked NoFeelCaptcha version to production
title: "[Deploy] NoFeelCaptcha production"
body:
  - type: markdown
    attributes:
      value: |
        Opening this Issue starts one production deployment. The locked source
        version in `config/nofeel-k8s.lock` is used; this form cannot select a
        branch, tag, or commit. The workflow posts its result and closes this
        Issue when the attempt finishes.

  - type: checkboxes
    id: production-confirmation
    attributes:
      label: Production confirmation
      options:
        - label: I confirm that this Issue may build and roll out the locked version to production.
          required: true
