name: NoFeelCaptcha production deploy

run-name: >-
  ${{ github.event_name == 'issues'
      && format('Deploy from {0} issue {1}', github.repository, github.event.issue.number)
      || format('Direct deploy by {0}', github.actor) }}

on:
  issues:
    types:
      - opened
  workflow_dispatch:
    inputs:
      source_commit:
        description: Full 40-character nofeel-k8s commit on main
        required: true
        type: string
      confirm_production:
        description: Confirm that this run may update production
        required: true
        default: false
        type: boolean

permissions: {}

env:
  REGISTRY: ghcr.io
  IMAGE_NAMESPACE: cong0707

jobs:
  authorize:
    name: Authorize deployment request
    if: >-
      github.event_name != 'issues' ||
      github.event.issue.pull_request == null
    runs-on: ubuntu-24.04
    permissions:
      issues: write
    outputs:
      authorized: ${{ steps.policy.outputs.authorized }}
      valid_request: ${{ steps.policy.outputs.valid_request }}
      trigger_actor: ${{ steps.policy.outputs.trigger_actor }}
      trigger_source: ${{ steps.policy.outputs.trigger_source }}
      source_commit: ${{ steps.policy.outputs.source_commit }}
    steps:
      - name: Validate actor and deployment confirmation
        id: policy
        shell: bash
        env:
          ALLOWED_TRIGGER_ACTORS: ${{ vars.ALLOWED_TRIGGER_ACTORS }}
          GH_TOKEN: ${{ github.token }}
        run: |
          set -Eeuo pipefail

          set_output() {
            printf '%s=%s\n' "$1" "$2" >> "$GITHUB_OUTPUT"
          }

          close_issue() {
            local reason="$1"
            local payload
            payload="$(jq -cn --arg reason "$reason" \
              '{state:"closed",state_reason:$reason}')"
            curl --fail-with-body --silent --show-error \
              --retry 3 --retry-all-errors \
              --request PATCH \
              --header 'Accept: application/vnd.github+json' \
              --header "Authorization: Bearer ${GH_TOKEN}" \
              --header 'X-GitHub-Api-Version: 2022-11-28' \
              "https://api.github.com/repos/${GITHUB_REPOSITORY}/issues/${issue_number}" \
              --data "$payload" >/dev/null
          }

          set_output authorized false
          set_output valid_request false
          set_output trigger_actor unknown
          set_output trigger_source unknown
          set_output source_commit unknown

          if [[ "$GITHUB_EVENT_NAME" == workflow_dispatch ]]; then
            actor="$(jq -r '.sender.login // ""' "$GITHUB_EVENT_PATH")"
            confirmed="$(jq -r '(.inputs.confirm_production // false) | tostring' "$GITHUB_EVENT_PATH")"
            source_commit="$(jq -r '.inputs.source_commit // ""' "$GITHUB_EVENT_PATH")"
            [[ "$actor" == "$GITHUB_REPOSITORY_OWNER" ]] || {
              echo "direct deployment is restricted to ${GITHUB_REPOSITORY_OWNER}" >&2
              exit 1
            }
            [[ "$confirmed" == true ]] || {
              echo 'production confirmation is required' >&2
              exit 1
            }
            [[ "$source_commit" =~ ^[0-9a-fA-F]{40}$ ]] || {
              echo 'a full 40-character nofeel-k8s commit is required' >&2
              exit 1
            }
            source_commit="${source_commit,,}"
            set_output authorized true
            set_output valid_request true
            set_output trigger_actor "$actor"
            set_output trigger_source "${GITHUB_REPOSITORY} direct workflow_dispatch"
            set_output source_commit "$source_commit"
            exit 0
          fi

          actor="$(jq -r '.issue.user.login' "$GITHUB_EVENT_PATH")"
          issue_title="$(jq -r '.issue.title' "$GITHUB_EVENT_PATH")"
          issue_body="$(jq -r '.issue.body // ""' "$GITHUB_EVENT_PATH")"
          issue_body="${issue_body//$'\r'/}"
          issue_number="$(jq -r '.issue.number' "$GITHUB_EVENT_PATH")"

          allowed=0
          IFS=',' read -r -a actors <<< "${ALLOWED_TRIGGER_ACTORS:-}"
          for candidate in "${actors[@]}"; do
            candidate="${candidate//[[:space:]]/}"
            if [[ -n "$candidate" && "${candidate,,}" == "${actor,,}" ]]; then
              allowed=1
              break
            fi
          done

          if (( allowed != 1 )); then
            echo "Closing unauthorized deployment issue from ${actor}."
            close_issue not_planned
            exit 0
          fi
          set_output authorized true

          expected_title='[Deploy] NoFeelCaptcha production'
          expected_confirmation_lower='- [x] I confirm that this Issue may build and roll out the selected commit to production.'
          expected_confirmation_upper='- [X] I confirm that this Issue may build and roll out the selected commit to production.'
          if [[ "$issue_title" != "$expected_title" ]] || \
             { ! grep -Fqx -- "$expected_confirmation_lower" <<< "$issue_body" && \
               ! grep -Fqx -- "$expected_confirmation_upper" <<< "$issue_body"; }; then
            echo 'Closing an authorized issue that does not match the deployment form.'
            close_issue not_planned
            exit 0
          fi

          source_commit="$(awk '
            $0 == "### nofeel-k8s commit" { found=1; next }
            found && NF { print; exit }
          ' <<< "$issue_body")"
          if [[ ! "$source_commit" =~ ^[0-9a-fA-F]{40}$ ]]; then
            echo 'Closing an authorized issue with an invalid nofeel-k8s commit.'
            close_issue not_planned
            exit 0
          fi
          source_commit="${source_commit,,}"

          set_output valid_request true
          set_output trigger_actor "$actor"
          set_output trigger_source "${GITHUB_REPOSITORY} issue ${issue_number}"
          set_output source_commit "$source_commit"

  build-and-deploy:
    name: Build, publish and roll out NoFeelCaptcha
    needs:
      - authorize
    if: >-
      needs.authorize.outputs.authorized == 'true' &&
      needs.authorize.outputs.valid_request == 'true'
    runs-on: ubuntu-24.04
    environment: production
    timeout-minutes: 120
    concurrency:
      group: nofeel-production-deploy
      cancel-in-progress: false
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout CI repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          ref: main
          persist-credentials: false

      - name: Checkout selected nofeel-k8s source
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          repository: NoFeelCaptcha/nofeel-k8s
          ref: ${{ needs.authorize.outputs.source_commit }}
          token: ${{ secrets.NOFEEL_REPOSITORIES_TOKEN || github.token }}
          path: nofeel-k8s
          persist-credentials: false
          fetch-depth: 0

      - name: Require selected source on protected main
        working-directory: nofeel-k8s
        shell: bash
        env:
          SOURCE_COMMIT: ${{ needs.authorize.outputs.source_commit }}
        run: |
          set -euo pipefail
          test "$(git rev-parse HEAD)" = "$SOURCE_COMMIT"
          git merge-base --is-ancestor "$SOURCE_COMMIT" refs/remotes/origin/main

      - name: Read locked component commits
        id: components
        working-directory: nofeel-k8s
        shell: bash
        run: |
          set -euo pipefail
          read_commit() {
            awk -v component="$1" '$1 == component ":" { found=1; next } found && $1 == "commit:" { print $2; exit }' config/components.lock.yaml
          }
          server_commit="$(read_commit server)"
          browser_commit="$(read_commit browser)"
          frontend_commit="$(read_commit frontend)"
          for commit in "$server_commit" "$browser_commit" "$frontend_commit"; do
            [[ "$commit" =~ ^[0-9a-f]{40}$ ]]
          done
          printf 'server_commit=%s\n' "$server_commit" >> "$GITHUB_OUTPUT"
          printf 'browser_commit=%s\n' "$browser_commit" >> "$GITHUB_OUTPUT"
          printf 'frontend_commit=%s\n' "$frontend_commit" >> "$GITHUB_OUTPUT"

      - name: Checkout locked server component
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          repository: NoFeelCaptcha/nofeel-server
          ref: ${{ steps.components.outputs.server_commit }}
          token: ${{ secrets.NOFEEL_REPOSITORIES_TOKEN || github.token }}
          path: nofeel-k8s/.tools/components/nofeel-server
          persist-credentials: false

      - name: Checkout locked browser component
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          repository: NoFeelCaptcha/nofeel-browser
          ref: ${{ steps.components.outputs.browser_commit }}
          token: ${{ secrets.NOFEEL_REPOSITORIES_TOKEN || github.token }}
          path: nofeel-k8s/.tools/components/nofeel-browser
          persist-credentials: false
          submodules: recursive

      - name: Checkout locked frontend component
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          repository: NoFeelCaptcha/nofeel-frontend
          ref: ${{ steps.components.outputs.frontend_commit }}
          token: ${{ secrets.NOFEEL_REPOSITORIES_TOKEN || github.token }}
          path: nofeel-k8s/.tools/components/nofeel-frontend
          persist-credentials: false

      - name: Validate source and manifests
        shell: bash
        env:
          NOFEEL_ROOT: ${{ github.workspace }}/nofeel-k8s
        run: bash scripts/validate-source.sh

      - name: Login to GHCR
        shell: bash
        env:
          REGISTRY_USERNAME: ${{ github.repository_owner }}
          REGISTRY_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          echo "$REGISTRY_TOKEN" | docker login "$REGISTRY" --username "$REGISTRY_USERNAME" --password-stdin

      - name: Build and publish immutable images
        id: images
        shell: bash
        env:
          NOFEEL_ROOT: ${{ github.workspace }}/nofeel-k8s
          REGISTRY: ${{ env.REGISTRY }}
          IMAGE_NAMESPACE: ${{ env.IMAGE_NAMESPACE }}
        run: bash scripts/build-and-push.sh

      - name: Render Kubernetes release manifests
        shell: bash
        env:
          NOFEEL_ROOT: ${{ github.workspace }}/nofeel-k8s
          SERVER_IMAGE: ${{ steps.images.outputs.server }}
          RUNTIME_IMAGE: ${{ steps.images.outputs.runtime }}
          FRONTEND_IMAGE: ${{ steps.images.outputs.frontend }}
          OUTPUT_DIR: ${{ runner.temp }}/nofeel-release
        run: |
          bash scripts/render-release.sh

      - name: Configure pinned SSH trust
        shell: bash
        env:
          DEPLOY_SSH_PRIVATE_KEY: ${{ secrets.DEPLOY_SSH_PRIVATE_KEY }}
          DEPLOY_KNOWN_HOSTS: ${{ secrets.DEPLOY_KNOWN_HOSTS }}
        run: |
          set -euo pipefail
          test -n "$DEPLOY_SSH_PRIVATE_KEY"
          test -n "$DEPLOY_KNOWN_HOSTS"
          install -d -m 0700 "$HOME/.ssh"
          printf '%s\n' "$DEPLOY_SSH_PRIVATE_KEY" > "$HOME/.ssh/id_ed25519"
          printf '%s\n' "$DEPLOY_KNOWN_HOSTS" > "$HOME/.ssh/known_hosts"
          chmod 0600 "$HOME/.ssh/id_ed25519" "$HOME/.ssh/known_hosts"

      - name: Deploy through standard SSH and kubectl
        shell: bash
        env:
          DEPLOY_HOST: ${{ vars.DEPLOY_HOST }}
          DEPLOY_USER: ${{ vars.DEPLOY_USER || 'root' }}
          MANIFEST_DIR: ${{ runner.temp }}/nofeel-release
        run: |
          bash scripts/deploy-via-ssh.sh

      - name: Cleanup runner temporary files
        if: ${{ always() }}
        shell: bash
        run: rm -rf "$RUNNER_TEMP/nofeel-release" "$HOME/.ssh/id_ed25519" "$HOME/.ssh/known_hosts"

      - name: Write deployment summary
        if: ${{ success() }}
        shell: bash
        env:
          TRIGGER_ACTOR: ${{ needs.authorize.outputs.trigger_actor }}
          TRIGGER_SOURCE: ${{ needs.authorize.outputs.trigger_source }}
        run: |
          cat >> "$GITHUB_STEP_SUMMARY" <<EOF
          ## NoFeelCaptcha deployment completed

          - Trigger source: `${TRIGGER_SOURCE}`
          - Triggered by: `${TRIGGER_ACTOR}`
          - Requested source commit: `${{ needs.authorize.outputs.source_commit }}`
          - Source commit: `${{ steps.images.outputs.source_commit }}`
          - Image tag: `${{ steps.images.outputs.tag }}`
          - Runtime: `${{ steps.images.outputs.runtime }}`
          - Server: `${{ steps.images.outputs.server }}`
          - Frontend: `${{ steps.images.outputs.frontend }}`
          - Target: OVH kubeadm control plane via pinned SSH host key and existing kubectl
          EOF

  finalize:
    name: Report result and close deployment issue
    needs:
      - authorize
      - build-and-deploy
    if: >-
      always() &&
      github.event_name == 'issues' &&
      needs.authorize.outputs.authorized == 'true' &&
      needs.authorize.outputs.valid_request == 'true'
    runs-on: ubuntu-24.04
    permissions:
      issues: write
    steps:
      - name: Comment result and close issue
        shell: bash
        env:
          DEPLOY_RESULT: ${{ needs.build-and-deploy.result }}
          GH_TOKEN: ${{ github.token }}
        run: |
          set -Eeuo pipefail
          issue_number="$(jq -r '.issue.number' "$GITHUB_EVENT_PATH")"
          run_url="${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}"
          case "$DEPLOY_RESULT" in
            success)
              message="Production deployment completed successfully. [View workflow run](${run_url})."
              reason=completed
              ;;
            failure)
              message="Production deployment failed. [View workflow run](${run_url}) and open a new deployment Issue after the failure is resolved."
              reason=not_planned
              ;;
            cancelled)
              message="Production deployment was cancelled. [View workflow run](${run_url}). Open a new deployment Issue to retry."
              reason=not_planned
              ;;
            *)
              message="Production deployment did not run (result: ${DEPLOY_RESULT}). [View workflow run](${run_url})."
              reason=not_planned
              ;;
          esac

          comment_payload="$(jq -cn --arg body "$message" '{body:$body}')"
          close_payload="$(jq -cn --arg reason "$reason" \
            '{state:"closed",state_reason:$reason}')"
          curl --fail-with-body --silent --show-error \
            --retry 3 --retry-all-errors \
            --request POST \
            --header 'Accept: application/vnd.github+json' \
            --header "Authorization: Bearer ${GH_TOKEN}" \
            --header 'X-GitHub-Api-Version: 2022-11-28' \
            "https://api.github.com/repos/${GITHUB_REPOSITORY}/issues/${issue_number}/comments" \
            --data "$comment_payload" >/dev/null
          curl --fail-with-body --silent --show-error \
            --retry 3 --retry-all-errors \
            --request PATCH \
            --header 'Accept: application/vnd.github+json' \
            --header "Authorization: Bearer ${GH_TOKEN}" \
            --header 'X-GitHub-Api-Version: 2022-11-28' \
            "https://api.github.com/repos/${GITHUB_REPOSITORY}/issues/${issue_number}" \
            --data "$close_payload" >/dev/null
