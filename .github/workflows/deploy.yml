name: NoFeelCaptcha production deploy

on:
  workflow_dispatch:
    inputs:
      confirm_production:
        description: Confirm that this run may build and update production
        required: true
        default: false
        type: boolean

permissions:
  contents: read
  packages: write

concurrency:
  group: nofeel-production-deploy
  cancel-in-progress: false

env:
  REGISTRY: ghcr.io
  IMAGE_NAMESPACE: cong0707

jobs:
  build-and-deploy:
    name: Build, publish and roll out NoFeelCaptcha
    if: ${{ github.ref == 'refs/heads/main' }}
    runs-on: ubuntu-24.04
    environment: production
    timeout-minutes: 120
    steps:
      - name: Validate manual trigger policy
        shell: bash
        env:
          ACTOR: ${{ github.actor }}
          OWNER: ${{ github.repository_owner }}
          ALLOWED_TRIGGER_ACTORS: ${{ vars.ALLOWED_TRIGGER_ACTORS }}
        run: |
          set -euo pipefail
          allowed_list="${OWNER},${ALLOWED_TRIGGER_ACTORS:-}"
          allowed=0
          IFS=',' read -r -a actors <<< "${allowed_list}"
          for candidate in "${actors[@]}"; do
            candidate="${candidate//[[:space:]]/}"
            if [[ -n "${candidate}" && "${candidate,,}" == "${ACTOR,,}" ]]; then
              allowed=1
              break
            fi
          done
          if (( allowed != 1 )); then
            echo "actor ${ACTOR} is not allowed to trigger production" >&2
            exit 1
          fi

      - name: Require explicit production confirmation
        if: ${{ inputs.confirm_production != true }}
        shell: bash
        run: |
          echo 'Set confirm_production=true to run a production deployment.' >&2
          exit 1

      - name: Checkout CI repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false

      - name: Read locked source commit
        id: lock
        shell: bash
        run: |
          set -euo pipefail
          source_commit="$(sed -n 's/^commit: //p' config/nofeel-k8s.lock)"
          [[ "${source_commit}" =~ ^[0-9a-f]{40}$ ]]
          printf 'source_commit=%s\n' "${source_commit}" >> "${GITHUB_OUTPUT}"

      - name: Checkout nofeel-k8s source
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          repository: NoFeelCaptcha/nofeel-k8s
          ref: ${{ steps.lock.outputs.source_commit }}
          token: ${{ secrets.NOFEEL_REPOSITORIES_TOKEN || github.token }}
          path: nofeel-k8s
          persist-credentials: false

      - name: Read locked component commits
        id: components
        working-directory: nofeel-k8s
        shell: bash
        run: |
          set -euo pipefail
          read_commit() {
            awk -v component="$1" '$1 == component ":" { found=1; next } found && $1 == "commit:" { print $2; exit }' config/components.lock.yaml
          }
          server_commit="$(read_commit server)"
          browser_commit="$(read_commit browser)"
          frontend_commit="$(read_commit frontend)"
          for commit in "$server_commit" "$browser_commit" "$frontend_commit"; do
            [[ "$commit" =~ ^[0-9a-f]{40}$ ]]
          done
          printf 'server_commit=%s\n' "$server_commit" >> "$GITHUB_OUTPUT"
          printf 'browser_commit=%s\n' "$browser_commit" >> "$GITHUB_OUTPUT"
          printf 'frontend_commit=%s\n' "$frontend_commit" >> "$GITHUB_OUTPUT"

      - name: Checkout locked server component
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          repository: NoFeelCaptcha/nofeel-server
          ref: ${{ steps.components.outputs.server_commit }}
          token: ${{ secrets.NOFEEL_REPOSITORIES_TOKEN || github.token }}
          path: nofeel-k8s/.tools/components/nofeel-server
          persist-credentials: false

      - name: Checkout locked browser component
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          repository: NoFeelCaptcha/nofeel-browser
          ref: ${{ steps.components.outputs.browser_commit }}
          token: ${{ secrets.NOFEEL_REPOSITORIES_TOKEN || github.token }}
          path: nofeel-k8s/.tools/components/nofeel-browser
          persist-credentials: false

      - name: Checkout locked frontend component
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          repository: NoFeelCaptcha/nofeel-frontend
          ref: ${{ steps.components.outputs.frontend_commit }}
          token: ${{ secrets.NOFEEL_REPOSITORIES_TOKEN || github.token }}
          path: nofeel-k8s/.tools/components/nofeel-frontend
          persist-credentials: false

      - name: Validate source and manifests
        shell: bash
        env:
          NOFEEL_ROOT: ${{ github.workspace }}/nofeel-k8s
        run: bash scripts/validate-source.sh

      - name: Login to GHCR
        shell: bash
        env:
          REGISTRY_USERNAME: ${{ github.actor }}
          REGISTRY_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          echo "$REGISTRY_TOKEN" | docker login "$REGISTRY" --username "$REGISTRY_USERNAME" --password-stdin

      - name: Build and publish immutable images
        id: images
        shell: bash
        env:
          NOFEEL_ROOT: ${{ github.workspace }}/nofeel-k8s
          REGISTRY: ${{ env.REGISTRY }}
          IMAGE_NAMESPACE: ${{ env.IMAGE_NAMESPACE }}
        run: bash scripts/build-and-push.sh

      - name: Generate release manifest
        shell: bash
        env:
          SOURCE_COMMIT: ${{ steps.images.outputs.source_commit }}
          SERVER_IMAGE: ${{ steps.images.outputs.server }}
          RUNTIME_IMAGE: ${{ steps.images.outputs.runtime }}
          FRONTEND_IMAGE: ${{ steps.images.outputs.frontend }}
        run: |
          bash scripts/make-release-manifest.sh > "$RUNNER_TEMP/nofeel-release.env"
          cat "$RUNNER_TEMP/nofeel-release.env"

      - name: Configure pinned SSH trust
        shell: bash
        env:
          DEPLOY_SSH_PRIVATE_KEY: ${{ secrets.DEPLOY_SSH_PRIVATE_KEY }}
          DEPLOY_KNOWN_HOSTS: ${{ secrets.DEPLOY_KNOWN_HOSTS }}
        run: |
          set -euo pipefail
          test -n "$DEPLOY_SSH_PRIVATE_KEY"
          test -n "$DEPLOY_KNOWN_HOSTS"
          install -d -m 0700 "$HOME/.ssh"
          printf '%s\n' "$DEPLOY_SSH_PRIVATE_KEY" > "$HOME/.ssh/id_ed25519"
          printf '%s\n' "$DEPLOY_KNOWN_HOSTS" > "$HOME/.ssh/known_hosts"
          chmod 0600 "$HOME/.ssh/id_ed25519" "$HOME/.ssh/known_hosts"

      - name: Send release manifest through forced command
        shell: bash
        env:
          DEPLOY_HOST: ${{ vars.DEPLOY_HOST }}
          DEPLOY_USER: ${{ vars.DEPLOY_USER || 'root' }}
        run: |
          set -euo pipefail
          test -n "$DEPLOY_HOST"
          test "$DEPLOY_USER" = root
          ssh -T -o StrictHostKeyChecking=yes -o IdentitiesOnly=yes \
            -o ConnectTimeout=10 -o ServerAliveInterval=15 -o ServerAliveCountMax=2 \
            "$DEPLOY_USER@$DEPLOY_HOST" < "$RUNNER_TEMP/nofeel-release.env"
          rm -f "$RUNNER_TEMP/nofeel-release.env"

      - name: Cleanup runner temporary files
        if: ${{ always() }}
        shell: bash
        run: rm -f "$RUNNER_TEMP/nofeel-release.env"

      - name: Write deployment summary
        if: ${{ success() }}
        shell: bash
        run: |
          cat >> "$GITHUB_STEP_SUMMARY" <<EOF
          ## NoFeelCaptcha deployment completed

          - Locked source commit: `${{ steps.lock.outputs.source_commit }}`
          - Source commit: `${{ steps.images.outputs.source_commit }}`
          - Image tag: `${{ steps.images.outputs.tag }}`
          - Runtime: `${{ steps.images.outputs.runtime }}`
          - Server: `${{ steps.images.outputs.server }}`
          - Frontend: `${{ steps.images.outputs.frontend }}`
          - Target: OVH kubeadm control plane via pinned SSH host key
          EOF
