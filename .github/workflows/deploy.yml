name: NoFeelCaptcha production deploy

run-name: >-
  ${{ inputs.source_repository == ''
      && format('Direct deploy by {0}', github.actor)
      || format('Deploy from {0} run {1}', inputs.source_repository, inputs.source_run_id) }}

on:
  workflow_dispatch:
    inputs:
      confirm_production:
        description: Confirm that this run may update production
        required: true
        default: false
        type: boolean
      source_repository:
        description: Bridge only; leave empty for a direct owner deployment
        required: false
        default: ''
        type: string
      source_run_id:
        description: Bridge only; leave empty for a direct owner deployment
        required: false
        default: ''
        type: string

permissions: {}

env:
  REGISTRY: ghcr.io
  IMAGE_NAMESPACE: cong0707

jobs:
  authorize:
    name: Authorize deployment request
    runs-on: ubuntu-24.04
    permissions:
      actions: read
    outputs:
      authorized: ${{ steps.policy.outputs.authorized }}
      valid_request: ${{ steps.policy.outputs.valid_request }}
      trigger_actor: ${{ steps.policy.outputs.trigger_actor }}
      trigger_source: ${{ steps.policy.outputs.trigger_source }}
    steps:
      - name: Validate actor and deployment confirmation
        id: policy
        shell: bash
        env:
          ALLOWED_TRIGGER_ACTORS: ${{ vars.ALLOWED_TRIGGER_ACTORS }}
          REMOTE_DISPATCH_ACTOR: ${{ vars.REMOTE_DISPATCH_ACTOR }}
          GH_TOKEN: ${{ github.token }}
        run: |
          set -Eeuo pipefail

          set_output() {
            printf '%s=%s\n' "$1" "$2" >> "$GITHUB_OUTPUT"
          }

          actor_allowed() {
            local actor="$1"
            local candidate
            IFS=',' read -r -a actors <<< "${ALLOWED_TRIGGER_ACTORS:-}"
            for candidate in "${actors[@]}"; do
              candidate="${candidate//[[:space:]]/}"
              if [[ -n "$candidate" && "${candidate,,}" == "${actor,,}" ]]; then
                return 0
              fi
            done
            return 1
          }

          set_output authorized false
          set_output valid_request false
          set_output trigger_actor unknown
          set_output trigger_source unknown

          confirm_production="$(jq -r '(.inputs.confirm_production // false) | tostring' "$GITHUB_EVENT_PATH")"
          source_repository="$(jq -r '.inputs.source_repository // ""' "$GITHUB_EVENT_PATH")"
          source_run_id="$(jq -r '.inputs.source_run_id // ""' "$GITHUB_EVENT_PATH")"
          dispatch_sender="$(jq -r '.sender.login // ""' "$GITHUB_EVENT_PATH")"

          [[ "$confirm_production" == true ]] || {
            echo 'production confirmation is required' >&2
            exit 1
          }

          if [[ -z "$source_repository" && -z "$source_run_id" ]]; then
            [[ "$dispatch_sender" == "$GITHUB_REPOSITORY_OWNER" ]] || {
              echo "direct deployment is restricted to ${GITHUB_REPOSITORY_OWNER}" >&2
              exit 1
            }
            set_output authorized true
            set_output valid_request true
            set_output trigger_actor "$dispatch_sender"
            set_output trigger_source "${GITHUB_REPOSITORY} direct workflow_dispatch"
            exit 0
          fi

          [[ -n "$source_repository" && -n "$source_run_id" ]] || {
            echo 'remote source repository and run ID must be supplied together' >&2
            exit 1
          }
          [[ -n "$REMOTE_DISPATCH_ACTOR" && "$dispatch_sender" == "$REMOTE_DISPATCH_ACTOR" ]] || {
            echo 'remote dispatch sender is not the configured GitHub App' >&2
            exit 1
          }
          [[ "$source_repository" == 'NoFeelCaptcha/nofeel-k8s-ci' ]] || {
            echo 'remote dispatch source repository is not trusted' >&2
            exit 1
          }
          [[ "$source_run_id" =~ ^[1-9][0-9]*$ ]] || {
            echo 'remote dispatch source run ID is invalid' >&2
            exit 1
          }

          source_run="$(curl --fail-with-body --silent --show-error \
            --retry 3 --retry-all-errors \
            --header 'Accept: application/vnd.github+json' \
            --header 'X-GitHub-Api-Version: 2022-11-28' \
            "https://api.github.com/repos/${source_repository}/actions/runs/${source_run_id}")"
          actor="$(jq -r '.actor.login // ""' <<< "$source_run")"
          source_event="$(jq -r '.event // ""' <<< "$source_run")"
          source_branch="$(jq -r '.head_branch // ""' <<< "$source_run")"
          source_path="$(jq -r '.path // ""' <<< "$source_run")"
          source_status="$(jq -r '.status // ""' <<< "$source_run")"
          source_created_at="$(jq -r '.created_at // ""' <<< "$source_run")"
          source_repo_actual="$(jq -r '.repository.full_name // ""' <<< "$source_run")"

          [[ "$source_repo_actual" == "$source_repository" ]] || {
            echo 'source run repository does not match' >&2
            exit 1
          }
          [[ "$source_event" == workflow_dispatch ]] || {
            echo 'source run was not manually dispatched' >&2
            exit 1
          }
          [[ "$source_branch" == main ]] || {
            echo 'source run did not use protected main' >&2
            exit 1
          }
          [[ "$source_path" == '.github/workflows/trigger.yml' ]] || {
            echo 'source run used an unexpected workflow' >&2
            exit 1
          }
          [[ "$source_status" == queued || "$source_status" == in_progress ]] || {
            echo 'source run is no longer active' >&2
            exit 1
          }
          actor_allowed "$actor" || {
            echo "source actor ${actor} is not in ALLOWED_TRIGGER_ACTORS" >&2
            exit 1
          }

          now_epoch="$(date -u +%s)"
          source_epoch="$(date -u -d "$source_created_at" +%s)"
          age_seconds="$((now_epoch - source_epoch))"
          (( age_seconds >= -60 && age_seconds <= 900 )) || {
            echo 'source workflow run is outside the 15-minute authorization window' >&2
            exit 1
          }

          expected_title="Deploy from ${source_repository} run ${source_run_id}"
          first_matching_run=''
          for _ in 1 2 3 4 5; do
            target_runs="$(curl --fail-with-body --silent --show-error \
              --retry 3 --retry-all-errors \
              --header 'Accept: application/vnd.github+json' \
              --header "Authorization: Bearer ${GH_TOKEN}" \
              --header 'X-GitHub-Api-Version: 2022-11-28' \
              "https://api.github.com/repos/${GITHUB_REPOSITORY}/actions/workflows/deploy.yml/runs?event=workflow_dispatch&per_page=100")"
            first_matching_run="$(jq -r --arg title "$expected_title" \
              '[.workflow_runs[] | select(.display_title == $title) | .id] | min // empty' \
              <<< "$target_runs")"
            [[ -n "$first_matching_run" ]] && break
            sleep 2
          done
          [[ "$first_matching_run" == "$GITHUB_RUN_ID" ]] || {
            echo 'source workflow run was already used or could not be claimed' >&2
            exit 1
          }

          set_output authorized true
          set_output valid_request true
          set_output trigger_actor "$actor"
          set_output trigger_source "${source_repository} run ${source_run_id}"

  build-and-deploy:
    name: Build, publish and roll out NoFeelCaptcha
    needs:
      - authorize
    if: >-
      needs.authorize.outputs.authorized == 'true' &&
      needs.authorize.outputs.valid_request == 'true'
    runs-on: ubuntu-24.04
    environment: production
    timeout-minutes: 120
    concurrency:
      group: nofeel-production-deploy
      cancel-in-progress: false
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout CI repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          ref: main
          persist-credentials: false

      - name: Read locked source commit
        id: lock
        shell: bash
        run: |
          set -euo pipefail
          source_commit="$(sed -n 's/^commit: //p' config/nofeel-k8s.lock)"
          [[ "${source_commit}" =~ ^[0-9a-f]{40}$ ]]
          printf 'source_commit=%s\n' "${source_commit}" >> "${GITHUB_OUTPUT}"

      - name: Checkout nofeel-k8s source
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          repository: NoFeelCaptcha/nofeel-k8s
          ref: ${{ steps.lock.outputs.source_commit }}
          token: ${{ secrets.NOFEEL_REPOSITORIES_TOKEN || github.token }}
          path: nofeel-k8s
          persist-credentials: false

      - name: Read locked component commits
        id: components
        working-directory: nofeel-k8s
        shell: bash
        run: |
          set -euo pipefail
          read_commit() {
            awk -v component="$1" '$1 == component ":" { found=1; next } found && $1 == "commit:" { print $2; exit }' config/components.lock.yaml
          }
          server_commit="$(read_commit server)"
          browser_commit="$(read_commit browser)"
          frontend_commit="$(read_commit frontend)"
          for commit in "$server_commit" "$browser_commit" "$frontend_commit"; do
            [[ "$commit" =~ ^[0-9a-f]{40}$ ]]
          done
          printf 'server_commit=%s\n' "$server_commit" >> "$GITHUB_OUTPUT"
          printf 'browser_commit=%s\n' "$browser_commit" >> "$GITHUB_OUTPUT"
          printf 'frontend_commit=%s\n' "$frontend_commit" >> "$GITHUB_OUTPUT"

      - name: Checkout locked server component
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          repository: NoFeelCaptcha/nofeel-server
          ref: ${{ steps.components.outputs.server_commit }}
          token: ${{ secrets.NOFEEL_REPOSITORIES_TOKEN || github.token }}
          path: nofeel-k8s/.tools/components/nofeel-server
          persist-credentials: false

      - name: Checkout locked browser component
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          repository: NoFeelCaptcha/nofeel-browser
          ref: ${{ steps.components.outputs.browser_commit }}
          token: ${{ secrets.NOFEEL_REPOSITORIES_TOKEN || github.token }}
          path: nofeel-k8s/.tools/components/nofeel-browser
          persist-credentials: false

      - name: Checkout locked frontend component
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          repository: NoFeelCaptcha/nofeel-frontend
          ref: ${{ steps.components.outputs.frontend_commit }}
          token: ${{ secrets.NOFEEL_REPOSITORIES_TOKEN || github.token }}
          path: nofeel-k8s/.tools/components/nofeel-frontend
          persist-credentials: false

      - name: Validate source and manifests
        shell: bash
        env:
          NOFEEL_ROOT: ${{ github.workspace }}/nofeel-k8s
        run: bash scripts/validate-source.sh

      - name: Login to GHCR
        shell: bash
        env:
          REGISTRY_USERNAME: ${{ github.repository_owner }}
          REGISTRY_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          echo "$REGISTRY_TOKEN" | docker login "$REGISTRY" --username "$REGISTRY_USERNAME" --password-stdin

      - name: Build and publish immutable images
        id: images
        shell: bash
        env:
          NOFEEL_ROOT: ${{ github.workspace }}/nofeel-k8s
          REGISTRY: ${{ env.REGISTRY }}
          IMAGE_NAMESPACE: ${{ env.IMAGE_NAMESPACE }}
        run: bash scripts/build-and-push.sh

      - name: Generate release manifest
        shell: bash
        env:
          SOURCE_COMMIT: ${{ steps.images.outputs.source_commit }}
          SERVER_IMAGE: ${{ steps.images.outputs.server }}
          RUNTIME_IMAGE: ${{ steps.images.outputs.runtime }}
          FRONTEND_IMAGE: ${{ steps.images.outputs.frontend }}
        run: |
          bash scripts/make-release-manifest.sh > "$RUNNER_TEMP/nofeel-release.env"
          cat "$RUNNER_TEMP/nofeel-release.env"

      - name: Configure pinned SSH trust
        shell: bash
        env:
          DEPLOY_SSH_PRIVATE_KEY: ${{ secrets.DEPLOY_SSH_PRIVATE_KEY }}
          DEPLOY_KNOWN_HOSTS: ${{ secrets.DEPLOY_KNOWN_HOSTS }}
        run: |
          set -euo pipefail
          test -n "$DEPLOY_SSH_PRIVATE_KEY"
          test -n "$DEPLOY_KNOWN_HOSTS"
          install -d -m 0700 "$HOME/.ssh"
          printf '%s\n' "$DEPLOY_SSH_PRIVATE_KEY" > "$HOME/.ssh/id_ed25519"
          printf '%s\n' "$DEPLOY_KNOWN_HOSTS" > "$HOME/.ssh/known_hosts"
          chmod 0600 "$HOME/.ssh/id_ed25519" "$HOME/.ssh/known_hosts"

      - name: Send release manifest through forced command
        shell: bash
        env:
          DEPLOY_HOST: ${{ vars.DEPLOY_HOST }}
          DEPLOY_USER: ${{ vars.DEPLOY_USER || 'root' }}
        run: |
          set -euo pipefail
          test -n "$DEPLOY_HOST"
          test "$DEPLOY_USER" = root
          ssh -T -o StrictHostKeyChecking=yes -o IdentitiesOnly=yes \
            -o ConnectTimeout=10 -o ServerAliveInterval=15 -o ServerAliveCountMax=2 \
            "$DEPLOY_USER@$DEPLOY_HOST" < "$RUNNER_TEMP/nofeel-release.env"
          rm -f "$RUNNER_TEMP/nofeel-release.env"

      - name: Cleanup runner temporary files
        if: ${{ always() }}
        shell: bash
        run: rm -f "$RUNNER_TEMP/nofeel-release.env"

      - name: Write deployment summary
        if: ${{ success() }}
        shell: bash
        env:
          TRIGGER_ACTOR: ${{ needs.authorize.outputs.trigger_actor }}
          TRIGGER_SOURCE: ${{ needs.authorize.outputs.trigger_source }}
        run: |
          cat >> "$GITHUB_STEP_SUMMARY" <<EOF
          ## NoFeelCaptcha deployment completed

          - Trigger source: `${TRIGGER_SOURCE}`
          - Triggered by: `${TRIGGER_ACTOR}`
          - Locked source commit: `${{ steps.lock.outputs.source_commit }}`
          - Source commit: `${{ steps.images.outputs.source_commit }}`
          - Image tag: `${{ steps.images.outputs.tag }}`
          - Runtime: `${{ steps.images.outputs.runtime }}`
          - Server: `${{ steps.images.outputs.server }}`
          - Frontend: `${{ steps.images.outputs.frontend }}`
          - Target: OVH kubeadm control plane via pinned SSH host key
          EOF
